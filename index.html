<body>

<div class="app-container">
  <header>
    <h1>Time 🕒</h1>
    <p>Global Time & Meeting Assistant</p>
  </header>

  <nav class="tab-navigation">
    <button class="tab-btn active" onclick="switchTab('time-by-cities')">Cities</button>
    <button class="tab-btn" onclick="switchTab('meeting-planner')">Planner</button>
  </nav>

  <div id="time-by-cities" class="tab-content active">
    <section class="inputs-section">
      <h3>1. Origin Setup</h3>
      <div class="input-vertical-full">
        <div class="input-group">
          <label>Date & Time:</label>
          <input type="datetime-local" id="input-datetime-1" value="2026-05-30T12:00">
        </div>
        <div class="input-group">
          <label for="select-origen">Origin City:</label>
          <select id="select-origen" class="selector-ciudad-global">
            </select>
        </div>
      </div>
    </section>

    <section class="outputs-section">
      <h3>2. World Timezones</h3>
      
      <div class="section-divider">Fixed Cities</div>
      <div class="list-ciudades" id="ciudades-fijas">
        </div>
      
      <div class="section-divider">Custom Cities (Select)</div>
      <div class="custom-inputs-vertical">
        <select class="input-libre selector-ciudad-global" id="libre-1"><option value="">-- Select City --</option></select>
        <select class="input-libre selector-ciudad-global" id="libre-2"><option value="">-- Select City --</option></select>
        <select class="input-libre selector-ciudad-global" id="libre-3"><option value="">-- Select City --</option></select>
        <select class="input-libre selector-ciudad-global" id="libre-4"><option value="">-- Select City --</option></select>
      </div>
      
      <div class="list-ciudades" id="ciudades-libres">
        </div>
    </section>
  </div>

  <div id="meeting-planner" class="tab-content">
    <section class="inputs-section">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h3 style="margin: 0;">1. Meeting & Window Setup</h3>
        <button id="btn-reset-planner" class="reset-btn" onclick="resetPlanner()">Clear All</button>
      </div>
      
      <div class="planner-row-compact" style="background: #e2e8f0; padding: 6px; border-radius: 6px; margin-bottom: 8px;">
        <div class="input-group-half">
          <label class="label-compact">Work Starts:</label>
          <input type="time" id="work-start" class="input-compact" value="08:00">
        </div>
        <div class="input-group-half">
          <label class="label-compact">Work Ends:</label>
          <input type="time" id="work-end" class="input-compact" value="17:00">
        </div>
      </div>

      <div class="planner-row-compact" style="margin-bottom: 10px;">
        <div class="input-group-half">
          <label class="label-compact">Date:</label>
          <input type="date" id="input-date-2" class="input-compact" value="2026-05-30">
        </div>
        <div class="input-group-half">
          <label class="label-compact">Duration:</label>
          <select id="select-duration" class="input-compact">
            <option value="30">30 Min</option>
            <option value="60" selected>1 Hour</option>
            <option value="90">1.5 Hours</option>
            <option value="120">2 Hours</option>
          </select>
        </div>
      </div>

      <div class="input-group">
        <label>Attendees (City 1 is the Host):</label>
        <div class="custom-inputs-vertical">
          <select class="input-planner-city selector-ciudad-global" id="plan-city-1"><option value="">-- Select City --</option></select>

          <select class="input-planner-city selector-ciudad-global" id="plan-city-5"><option value="">-- Select City --</option></select>
        </div>
      </div>
    </section>

    <section class="outputs-section">
      <h3>2. Available Slots</h3>
      <div id="meeting-results" class="results-container">
        <p class="placeholder-text">Select at least 2 cities to compute shared slots.</p>
      </div>
    </section>
  </div>
</div>
